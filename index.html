<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Carrom 3D - Minimal</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<style>
:root { --gold: #d4a532; --dark: #0d0907; --white-coin: #eee0c4; --black-coin: #2a2a2a; --dark-red: #6b1b1b; }
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}
body{width:100%;height:100%;overflow:hidden;background:var(--dark);font-family:sans-serif}
#wrap{position:absolute;inset:0}
#hud{position:absolute;inset:0;pointer-events:none;z-index:10}

/* Minimalist Score: Just Color Circle and Number */
.score-box {
    position: absolute; top: 20px; display: flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 40px;
    border: 1px solid rgba(212,165,50,0.1);
}
#spW { left: 20px; }
#spB { right: 20px; flex-direction: row-reverse; }
.coin-icon { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
.w-icon { background: var(--white-coin); }
.b-icon { background: var(--black-coin); }
.snum { font-size: 28px; font-weight: bold; color: var(--gold); }

/* Dynamic Options UI - Hides during game */
#options-ui { 
    position: absolute; bottom: 20px; right: 20px; pointer-events: auto; 
    display: flex; flex-direction: column; gap: 8px; transition: opacity 0.4s, transform 0.4s;
}
.ui-hidden { opacity: 0; transform: translateY(10px); pointer-events: none; }

button {
    background: rgba(0,0,0,0.8); border: 1px solid rgba(212,165,50,0.3); color: var(--gold);
    padding: 8px 16px; cursor: pointer; font-size: 10px; border-radius: 6px; letter-spacing: 1px;
    text-transform: uppercase; font-weight: bold;
}
.row { display: flex; gap: 4px; }

#pbar {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    width: 160px; height: 4px; background: rgba(255,255,255,0.1);
    border-radius: 2px; display: none; overflow: hidden;
}
#pfill { height: 100%; width: 0%; background: var(--gold); }
</style>
</head>
<body>
<div id="wrap"></div>
<div id="hud">
  <div id="spW" class="score-box">
    <div class="coin-icon w-icon"></div>
    <div class="snum" id="sW">0</div>
  </div>
  <div id="spB" class="score-box">
    <div class="coin-icon b-icon"></div>
    <div class="snum" id="sB">0</div>
  </div>

  <div id="pbar"><div id="pfill"></div></div>

  <div id="options-ui">
    <div class="row">
        <button id="b1">1V1</button>
        <button id="b2">2V2</button>
    </div>
    <button onclick="location.reload()">RESET</button>
    <button id="bF">FLIP</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- CONFIGURATION ---
var B = 6.8; // Board size rebuilt to 6.8
var HB = B/2;
var LINE_W = 0.02 * 0.7; // 30% reduction in width
var RED_LINE = 0x6b1b1b; // Dark Red Color

var scene, cam, renderer, striker;
var coins = [], isMoving = false;

function init() {
    renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('wrap').appendChild(renderer.domElement);

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f0a0a);

    cam = new THREE.PerspectiveCamera(28, window.innerWidth/window.innerHeight, 0.1, 100);
    cam.position.set(0, 11, 2.8);
    cam.lookAt(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    var sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(2, 10, 5);
    sun.castShadow = true;
    scene.add(sun);

    buildBoard();
    spawnAll();
    requestAnimationFrame(loop);
}

function buildBoard() {
    // Surface
    var surf = new THREE.Mesh(new THREE.BoxGeometry(B, 0.1, B), new THREE.MeshStandardMaterial({color: 0xd2a055, roughness: 0.5}));
    surf.receiveShadow = true;
    scene.add(surf);

    // Dark Frame
    var fMat = new THREE.MeshStandardMaterial({color: 0x3d1a05});
    var fBox = new THREE.Mesh(new THREE.BoxGeometry(B + 0.6, 0.4, 0.3), fMat);
    fBox.position.set(0, 0.15, HB + 0.15);
    scene.add(fBox, fBox.clone().translateZ(-(B + 0.3)));

    // Rebuilt Lines: Thin & Dark Red
    var lineMat = new THREE.MeshBasicMaterial({color: RED_LINE, transparent: true, opacity: 0.7});
    var ring = new THREE.Mesh(new THREE.RingGeometry(0.7, 0.7 + LINE_W, 64), lineMat);
    ring.rotation.x = -Math.PI/2;
    ring.position.y = 0.055;
    scene.add(ring);
    
    // Baseline
    var base = new THREE.Mesh(new THREE.PlaneGeometry(2.1, LINE_W), lineMat);
    base.rotation.x = -Math.PI/2;
    base.position.set(0, 0.055, 2.4);
    scene.add(base);
}

function spawnAll() {
    // Add central pieces
    addCoin(0, 0, 0xc0392b, 0.19); // Queen
    for(let i=0; i<6; i++) {
        let a = (i/6)*Math.PI*2;
        addCoin(Math.cos(a)*0.5, Math.sin(a)*0.5, i%2==0?0xeee0c4:0x222222, 0.18);
    }
    striker = addCoin(0, 2.4, 0xd4a532, 0.24);
    striker.vel = new THREE.Vector3();
}

function addCoin(x, z, col, r) {
    var m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, 0.12, 32), new THREE.MeshStandardMaterial({color: col}));
    m.position.set(x, 0.1, z);
    m.castShadow = true;
    scene.add(m);
    var p = { mesh: m, vel: new THREE.Vector3() };
    coins.push(p);
    return p;
}

function loop() {
    requestAnimationFrame(loop);
    let moving = false;
    coins.forEach(p => {
        if (p.vel && p.vel.length() > 0.005) {
            p.mesh.position.add(p.vel);
            p.vel.multiplyScalar(0.98); // friction
            moving = true;
        }
    });

    isMoving = moving;
    // UI Hiding Logic
    const ui = document.getElementById('options-ui');
    if (isMoving) ui.classList.add('ui-hidden');
    else ui.classList.remove('ui-hidden');

    renderer.render(scene, cam);
}

// Demo click to move
window.addEventListener('pointerdown', () => { if(!isMoving) striker.vel.z = -0.15; });

init();
</script>
</body>
</html>
