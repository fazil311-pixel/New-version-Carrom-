<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Carrom 3D</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0000;font-family:Georgia,serif}
#wrap{position:absolute;inset:0}
canvas{display:block}
#hud{position:absolute;inset:0;pointer-events:none;z-index:10}
.sp{position:absolute;top:8px;pointer-events:auto;background:rgba(6,3,1,0.92);border:1px solid rgba(212,165,50,0.35);border-radius:9px;padding:8px 12px;min-width:110px;transition:box-shadow .3s}
.sp.on{box-shadow:0 0 0 2px #d4a532}
#spW{left:8px}#spB{right:8px}
.plbl{font-size:7px;letter-spacing:2px;opacity:.45;text-transform:uppercase}
.pnm{font-size:12px;font-weight:bold;letter-spacing:1px;margin:2px 0}
#spW .pnm{color:#f0ebe0}#spB .pnm{color:#999}
.snum{font-size:24px;font-weight:bold;color:#d4a532;line-height:1}
.ssub{font-size:7px;opacity:.35;text-transform:uppercase;letter-spacing:1px}
.dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.dot{width:6px;height:6px;border-radius:50%}
.wd{background:#eee}.bd{background:#444}.qd{background:#c0392b}
#qb{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(180,40,30,.15);border:1px solid rgba(220,60,40,.5);color:#e74c3c;font-size:9px;letter-spacing:2px;padding:4px 11px;border-radius:14px;display:none;white-space:nowrap;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,60,40,.4)}50%{box-shadow:0 0 0 5px rgba(220,60,40,0)}}
#tb{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);background:rgba(6,3,1,0.90);border:1px solid rgba(212,165,50,0.28);border-radius:18px;padding:6px 14px;font-size:10px;letter-spacing:1px;display:flex;align-items:center;gap:7px;pointer-events:none;white-space:nowrap}
#td{width:8px;height:8px;border-radius:50%}
#tt{color:#d4a532}
#pw{position:absolute;bottom:50px;right:8px;width:85px;pointer-events:none;display:none}
#plb{font-size:7px;letter-spacing:2px;color:#d4a532;opacity:.5;margin-bottom:2px;text-align:right}
#pbar{height:3px;border-radius:2px;background:rgba(212,165,50,.12);overflow:hidden}
#pfill{height:100%;width:0%;background:linear-gradient(90deg,#d4a532,#e74c3c)}
#ctrl{position:absolute;bottom:8px;right:8px;pointer-events:auto;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.cb{font-size:9px;letter-spacing:1px;padding:6px 11px;border-radius:6px;border:1px solid rgba(212,165,50,0.32);background:rgba(6,3,1,0.92);color:#d4a532;cursor:pointer}
.cb.pr{background:rgba(212,165,50,.14);border-color:#d4a532}
#mr{display:flex;gap:3px}
.mb{font-size:8px;letter-spacing:1px;padding:4px 8px;border-radius:5px;border:1px solid rgba(212,165,50,0.22);background:rgba(6,3,1,0.92);color:#888;cursor:pointer}
.mb.on{color:#d4a532;border-color:#d4a532}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(212,165,50,.32);letter-spacing:1px;pointer-events:none;white-space:nowrap}
#toast{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(6,3,1,.95);border:1px solid rgba(212,165,50,0.3);color:#f0c84a;font-size:10px;letter-spacing:1px;padding:5px 13px;border-radius:13px;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
#toast.on{opacity:1}
#win{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,3,1,.90);pointer-events:none;opacity:0;transition:opacity .4s}
#win.on{opacity:1;pointer-events:auto}
#wt{font-size:34px;font-weight:bold;color:#f0c84a;margin-bottom:4px}
#ws{font-size:12px;color:#888;margin-bottom:22px;letter-spacing:2px}
#wb{font-size:11px;letter-spacing:2px;padding:9px 26px;border-radius:6px;border:1px solid #d4a532;background:rgba(212,165,50,.16);color:#d4a532;cursor:pointer}
#err{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a0404;border:2px solid #c0392b;color:#ff6666;padding:16px;border-radius:8px;font-size:12px;max-width:82%;text-align:center;z-index:99;white-space:pre-wrap}
</style>
</head>
<body>
<div id="wrap"></div>
<div id="hud">
  <div class="sp on" id="spW"><div class="plbl">Player One</div><div class="pnm">WHITE</div><div class="snum" id="sW">0</div><div class="ssub">Points</div><div class="dots" id="dW"></div></div>
  <div class="sp" id="spB"><div class="plbl">Player Two</div><div class="pnm">BLACK</div><div class="snum" id="sB">0</div><div class="ssub">Points</div><div class="dots" id="dB"></div></div>
  <div id="qb">&#9819; COVER THE QUEEN</div>
  <div id="tb"><div id="td"></div><span id="tt">WHITE'S TURN</span></div>
  <div id="pw"><div id="plb">POWER</div><div id="pbar"><div id="pfill"></div></div></div>
  <div id="ctrl">
    <div id="mr"><button class="mb on" id="b1">1V1</button><button class="mb" id="b2">2V2</button></div>
    <button class="cb pr" id="bR">&#8635; RESET</button>
    <button class="cb" id="bF">&#8635; FLIP</button>
  </div>
  <div id="hint">DRAG STRIKER TO AIM &middot; RELEASE TO SHOOT</div>
  <div id="toast"></div>
  <div id="win"><div id="wt">WHITE WINS!</div><div id="ws">GAME OVER</div><button id="wb">PLAY AGAIN</button></div>
</div>
<div id="err"></div>

<script>
window.onerror = function(msg, src, line) {
  var b = document.getElementById('err');
  b.style.display = 'block';
  b.textContent = 'Error: ' + msg + '\nLine: ' + line;
  return false;
};
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
if (typeof THREE === 'undefined') {
  var b = document.getElementById('err');
  b.style.display = 'block';
  b.textContent = 'THREE.js failed to load. Check internet connection.';
  throw new Error('no THREE');
}

// ═══════════════════════════════════════════════════
//  BOARD DIMENSIONS  —  8.4 × 8.4 playing area
//  All values consistently scaled from real 74cm board
//  Scale factor: 8.4 / 74 = 0.11351
// ═══════════════════════════════════════════════════
var B    = 8.40;   // playing surface width/depth
var HB   = 4.20;   // half of B
var FW   = 0.68;   // frame width on each side
var TH   = 0.14;   // board surface thickness
var FH   = 0.46;   // frame height

// Coin/striker radii (real: coin=1.59cm, striker=2.07cm, scaled)
var RC   = 0.193;  // coin radius
var RR   = 0.204;  // queen radius
var RS   = 0.250;  // striker radius

// Pockets
var PR   = 0.62;   // pocket capture radius
var PKO  = 0.60;   // pocket centre inset from corner
var POCKETS = [
  {x: -HB + PKO, z: -HB + PKO},
  {x:  HB - PKO, z: -HB + PKO},
  {x: -HB + PKO, z:  HB - PKO},
  {x:  HB - PKO, z:  HB - PKO}
];

// Physics
var FRIC_C  = 2.10;  // coulomb friction deceleration
var FRIC_V  = 1.40;  // viscous friction multiplier
var REST_V  = 0.055; // rest threshold velocity
var ELAST   = 0.86;  // coin-coin elasticity
var WELAST  = 0.68;  // wall elasticity
var MAX_PWR = 58;    // max launch speed
var SZ      = 3.20;  // striker baseline Z from centre
var STEPS   = 4;     // physics sub-steps per frame
var GN      = 14;    // ghost dot count

// Coin layout rings (scaled from 4.5cm / 9.0cm)
var IR = 0.510;
var OR = 1.020;

// ═══════════════════════════════════════════════════
//  LAYOUT  — 9 white + 9 black
// ═══════════════════════════════════════════════════
function makeLayout() {
  var w = [], b = [];
  for (var i = 0; i < 6; i++) {
    var a = (Math.PI / 3) * i - Math.PI / 2;
    (i % 2 === 0 ? w : b).push([Math.cos(a) * IR, Math.sin(a) * IR]);
  }
  for (var i = 0; i < 12; i++) {
    var a = (Math.PI / 6) * i - Math.PI / 2 + Math.PI / 12;
    (i % 2 === 0 ? w : b).push([Math.cos(a) * OR, Math.sin(a) * OR]);
  }
  return {w: w, b: b};
}

// ═══════════════════════════════════════════════════
//  GLOBAL STATE
// ═══════════════════════════════════════════════════
var scene, cam, renderer;
var coins = [], striker = null, aimLine = null, ghosts = [];
var ray = new THREE.Raycaster(), mouse = new THREE.Vector2();
var dragging = false, ready = false, active = false, settling = false;
var turn = 'white', sW = 0, sB = 0, pW = 0, pB = 0;
var qPending = false, qBy = null, qWon = null, flipped = false, toastTmr = null;

// ═══════════════════════════════════════════════════
//  COIN  — glossy lacquered puck
// ═══════════════════════════════════════════════════
function Coin(id, type, r, mass, x, z) {
  this.id = id; this.type = type; this.r = r; this.mass = mass;
  this.vx = 0; this.vz = 0; this.pocketed = false;

  var isSt = (type === 'striker');
  var ht   = isSt ? 0.220 : 0.150;
  var yp   = ht / 2 + 0.006;

  var COLS  = {white: 0xeee0c4, black: 0x141210, red: 0xcc1111, striker: 0xddbe30};
  var ROUGH = {white: 0.05, black: 0.06, red: 0.05, striker: 0.04};
  var META  = {white: 0.52, black: 0.58, red: 0.48, striker: 0.92};
  var RCOL  = {white: 0xc8bea8, black: 0x282828, red: 0xff3300,  striker: 0xffd700};
  var CCOL  = {white: 0xddd0b0, black: 0x1c1a16, red: 0xaa0000};

  // Body
  var bodyG = new THREE.CylinderGeometry(r * 0.96, r, ht, 52, 1);
  var bodyM = new THREE.MeshStandardMaterial({color: COLS[type], roughness: ROUGH[type], metalness: META[type]});
  this.mesh = new THREE.Mesh(bodyG, bodyM);
  this.mesh.castShadow = true;
  this.mesh.position.set(x, yp, z);
  scene.add(this.mesh);

  // Outer chrome rim
  var outerR = new THREE.Mesh(
    new THREE.RingGeometry(r * 0.76, r * 0.96, 52),
    new THREE.MeshStandardMaterial({color: RCOL[type], roughness: 0.04, metalness: 0.95, side: THREE.DoubleSide})
  );
  outerR.rotation.x = -Math.PI / 2;
  outerR.position.y = ht * 0.501;
  this.mesh.add(outerR);

  // Mid groove ring
  var midR = new THREE.Mesh(
    new THREE.RingGeometry(r * 0.50, r * 0.62, 52),
    new THREE.MeshStandardMaterial({color: RCOL[type], roughness: 0.05, metalness: 0.88, side: THREE.DoubleSide})
  );
  midR.rotation.x = -Math.PI / 2;
  midR.position.y = ht * 0.502;
  this.mesh.add(midR);

  if (!isSt) {
    // Centre cap
    var cap = new THREE.Mesh(
      new THREE.CylinderGeometry(r * 0.42, r * 0.42, 0.018, 40),
      new THREE.MeshStandardMaterial({color: CCOL[type], roughness: 0.05, metalness: 0.60})
    );
    cap.position.y = ht * 0.5 + 0.010;
    this.mesh.add(cap);

    if (type === 'red') {
      // Queen gold centre dot
      var qdot = new THREE.Mesh(
        new THREE.CylinderGeometry(0.038, 0.038, 0.022, 20),
        new THREE.MeshStandardMaterial({color: 0xffd700, roughness: 0.03, metalness: 0.99})
      );
      qdot.position.y = ht * 0.5 + 0.020;
      this.mesh.add(qdot);
    }
  } else {
    // Striker crosshair bars
    for (var bi = 0; bi < 2; bi++) {
      var bar = new THREE.Mesh(
        new THREE.BoxGeometry(r * 1.05, 0.007, 0.024),
        new THREE.MeshStandardMaterial({color: 0xb8860b, roughness: 0.06, metalness: 0.94})
      );
      bar.position.y = ht * 0.5 + 0.004;
      bar.rotation.y = bi * (Math.PI / 2);
      this.mesh.add(bar);
    }
    // Striker centre dot
    var cdot = new THREE.Mesh(
      new THREE.CylinderGeometry(0.042, 0.042, 0.022, 20),
      new THREE.MeshStandardMaterial({color: 0xffd700, roughness: 0.03, metalness: 0.99})
    );
    cdot.position.y = ht * 0.5 + 0.012;
    this.mesh.add(cdot);
  }
}

Coin.prototype = {
  get x()  { return this.mesh.position.x; },
  get z()  { return this.mesh.position.z; },
  set x(v) { this.mesh.position.x = v; },
  set z(v) { this.mesh.position.z = v; },
  speed: function() {
    return Math.sqrt(this.vx * this.vx + this.vz * this.vz);
  },
  update: function(dt) {
    var spd = this.speed();
    if (spd < REST_V) { this.vx = 0; this.vz = 0; return; }
    var nx = this.vx / spd, nz = this.vz / spd;
    var ns = spd - FRIC_C * dt;
    ns *= Math.max(0, 1 - FRIC_V * dt);
    if (ns < 0) ns = 0;
    this.vx = nx * ns; this.vz = nz * ns;
    this.x += this.vx * dt;
    this.z += this.vz * dt;
  }
};

// ═══════════════════════════════════════════════════
//  SCENE INIT
// ═══════════════════════════════════════════════════
function initScene() {
  renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.88;
  document.getElementById('wrap').appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x220808);

  // Near-orthographic top-down perspective camera
  cam = new THREE.PerspectiveCamera(26, window.innerWidth / window.innerHeight, 0.1, 200);
  posCam();

  // Lighting — directional only, no spotlight overexposure
  scene.add(new THREE.AmbientLight(0xfff8e8, 3.2));
  var sun = new THREE.DirectionalLight(0xfff4d8, 2.2);
  sun.position.set(2, 20, 8);
  sun.castShadow = true;
  sun.shadow.mapSize.width  = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.left   = -10;
  sun.shadow.camera.right  =  10;
  sun.shadow.camera.top    =  10;
  sun.shadow.camera.bottom = -10;
  scene.add(sun);
  var fill = new THREE.DirectionalLight(0xaabbee, 0.7);
  fill.position.set(-8, 12, -4);
  scene.add(fill);
  var rim = new THREE.DirectionalLight(0xffeedd, 0.5);
  rim.position.set(6, 8, -8);
  scene.add(rim);

  buildBoard();
  buildAimVis();
  spawnAll();

  window.addEventListener('resize',       onResize);
  window.addEventListener('pointermove',  onMove);
  window.addEventListener('pointerdown',  onDown);
  window.addEventListener('pointerup',    onUp);

  ready = true; active = true;
  updateHUD();
  requestAnimationFrame(loop);
}

function posCam() {
  if (!cam) return;
  var f = flipped ? -1 : 1;
  // Height chosen so 8.4-unit board fills screen with small margin
  cam.position.set(0, 14.5, f * 2.8);
  cam.lookAt(0, 0, f * 0.3);
}

// ═══════════════════════════════════════════════════
//  BOARD  — 8.4 × 8.4
// ═══════════════════════════════════════════════════
function buildBoard() {
  var TY = TH;      // board top surface Y = TH (since box centred at TH/2)
  var LY = TY + 0.004; // line Y, just above surface

  // ── 1. Playing surface (warm light wood) ──
  var surf = new THREE.Mesh(
    new THREE.BoxGeometry(B, TH, B),
    new THREE.MeshStandardMaterial({color: 0xd2a055, roughness: 0.58, metalness: 0.0})
  );
  surf.receiveShadow = true;
  surf.position.y = TH / 2;
  scene.add(surf);

  // ── 2. Frame (dark brown, 4 sides) ──
  var fmat = new THREE.MeshStandardMaterial({color: 0x5a1e06, roughness: 0.80, metalness: 0.02});
  var fpieces = [
    // [w, h, d,  x,       y,       z      ]
    [B + FW * 2, FH, FW,   0,        FH / 2,  HB + FW / 2],
    [B + FW * 2, FH, FW,   0,        FH / 2, -HB - FW / 2],
    [FW,         FH, B,    HB + FW / 2, FH / 2, 0],
    [FW,         FH, B,   -HB - FW / 2, FH / 2, 0]
  ];
  for (var fi = 0; fi < fpieces.length; fi++) {
    var fd = fpieces[fi];
    var fm = new THREE.Mesh(new THREE.BoxGeometry(fd[0], fd[1], fd[2]), fmat);
    fm.position.set(fd[3], fd[4], fd[5]);
    fm.castShadow = true;
    scene.add(fm);
  }

  // ── 3. Red/yellow diagonal stripe inlay on frame face ──
  var nSeg = 16;
  var segW = B / nSeg;
  var mRed = new THREE.MeshStandardMaterial({color: 0xcc0000, roughness: 0.55, metalness: 0.05});
  var mYel = new THREE.MeshStandardMaterial({color: 0xffcc00, roughness: 0.50, metalness: 0.10});
  var SW = 0.21, SH = 0.062;
  for (var si = 0; si < nSeg; si++) {
    var smat = si % 2 === 0 ? mRed : mYel;
    var ox   = -HB + si * segW + segW / 2;
    var oz   = -HB + si * segW + segW / 2;
    var sy   = FH / 2 + 0.012;
    // South face
    var m1 = new THREE.Mesh(new THREE.BoxGeometry(segW - 0.008, SH, SW), smat);
    m1.position.set(ox, sy, HB + SW / 2); scene.add(m1);
    // North face
    var m2 = new THREE.Mesh(new THREE.BoxGeometry(segW - 0.008, SH, SW), smat);
    m2.position.set(ox, sy, -HB - SW / 2); scene.add(m2);
    // East face
    var m3 = new THREE.Mesh(new THREE.BoxGeometry(SW, SH, segW - 0.008), smat);
    m3.position.set(HB + SW / 2, sy, oz); scene.add(m3);
    // West face
    var m4 = new THREE.Mesh(new THREE.BoxGeometry(SW, SH, segW - 0.008), smat);
    m4.position.set(-HB - SW / 2, sy, oz); scene.add(m4);
  }

  // ── 4. Yellow border strips (top inner edge) ──
  var ymat = new THREE.MeshStandardMaterial({color: 0xffcc00, roughness: 0.45, metalness: 0.12});
  var YW = 0.10, YH = 0.058;
  var ypieces = [
    [B + YW * 2, YH, YW,   0,         FH + YH / 2,  HB + YW / 2],
    [B + YW * 2, YH, YW,   0,         FH + YH / 2, -HB - YW / 2],
    [YW,         YH, B,    HB + YW / 2, FH + YH / 2, 0],
    [YW,         YH, B,   -HB - YW / 2, FH + YH / 2, 0]
  ];
  for (var yi = 0; yi < ypieces.length; yi++) {
    var yd = ypieces[yi];
    var ym = new THREE.Mesh(new THREE.BoxGeometry(yd[0], yd[1], yd[2]), ymat);
    ym.position.set(yd[3], yd[4], yd[5]);
    scene.add(ym);
  }

  // ── 5. Base platform ──
  var base = new THREE.Mesh(
    new THREE.BoxGeometry(B + FW * 2 + 0.18, 0.20, B + FW * 2 + 0.18),
    new THREE.MeshStandardMaterial({color: 0x38100 + 4, roughness: 0.88, metalness: 0.02})
  );
  base.position.y = -0.10;
  base.castShadow = true;
  scene.add(base);

  // ── 6. Board decorative lines ──
  var lc = 0xb87840;

  // Outer border rectangle  (inset 0.795 = 7.0 * 0.1135)
  var O1 = 0.795;
  drawRect(-HB + O1, -HB + O1,  HB - O1,  HB - O1,  LY, lc);
  // Inner border rectangle  (inset 1.873 = 16.5 * 0.1135)
  var O2 = 1.873;
  drawRect(-HB + O2, -HB + O2,  HB - O2,  HB - O2,  LY, lc);

  // Diagonal lines corner-to-corner
  drawLine(-HB + O1, -HB + O1,  -HB + O2, -HB + O2,  LY, lc);
  drawLine( HB - O1, -HB + O1,   HB - O2, -HB + O2,  LY, lc);
  drawLine(-HB + O1,  HB - O1,  -HB + O2,  HB - O2,  LY, lc);
  drawLine( HB - O1,  HB - O1,   HB - O2,  HB - O2,  LY, lc);

  // Centre concentric rings (rose pattern, 6 rings)
  var rmat = new THREE.MeshStandardMaterial({color: lc, side: THREE.DoubleSide, roughness: 0.88});
  var rads = [0.454, 0.681, 0.908, 1.135, 1.362, 1.589];
  for (var ri = 0; ri < rads.length; ri++) {
    var rr = rads[ri];
    var cr = new THREE.Mesh(new THREE.RingGeometry(rr, rr + 0.026, 72), rmat);
    cr.rotation.x = -Math.PI / 2;
    cr.position.y = LY;
    scene.add(cr);
  }

  // Small circle markers near corners (4 per corner)
  var cmat = new THREE.MeshStandardMaterial({color: lc, side: THREE.DoubleSide, roughness: 0.88});
  var pcOff = 1.305;  // 11.5 * 0.1135
  var pcs = [
    [-HB + pcOff, -HB + pcOff], [HB - pcOff, -HB + pcOff],
    [-HB + pcOff,  HB - pcOff], [HB - pcOff,  HB - pcOff]
  ];
  var moffs = [[0.45, 0], [-0.45, 0], [0, 0.45], [0, -0.45]];
  for (var ci = 0; ci < pcs.length; ci++) {
    var cx = pcs[ci][0], cz = pcs[ci][1];
    for (var oi = 0; oi < moffs.length; oi++) {
      var sm = new THREE.Mesh(new THREE.RingGeometry(0.144, 0.188, 32), cmat);
      sm.rotation.x = -Math.PI / 2;
      sm.position.set(cx + moffs[oi][0], LY, cz + moffs[oi][1]);
      scene.add(sm);
    }
  }

  // Striker baselines (both ends)
  var blmat = new THREE.MeshStandardMaterial({color: lc, side: THREE.DoubleSide, roughness: 0.88});
  for (var bsi = 0; bsi < 2; bsi++) {
    var bss = bsi === 0 ? -1 : 1;
    // Baseline bar
    var bl = new THREE.Mesh(new THREE.PlaneGeometry(2.16, 0.030), blmat);
    bl.rotation.x = -Math.PI / 2;
    bl.position.set(0, LY, bss * SZ);
    scene.add(bl);
    // Circle where striker sits
    var bc = new THREE.Mesh(new THREE.RingGeometry(0.245, 0.310, 40), blmat);
    bc.rotation.x = -Math.PI / 2;
    bc.position.set(0, LY, bss * SZ);
    scene.add(bc);
  }

  // ── 7. Pockets — 4 corners ──
  var psurMat = new THREE.MeshStandardMaterial({color: 0x380e04, roughness: 0.86, side: THREE.DoubleSide});
  var pholMat = new THREE.MeshStandardMaterial({color: 0x050202, roughness: 1.0});
  for (var pi = 0; pi < POCKETS.length; pi++) {
    var pk = POCKETS[pi];
    // Dark wood surround circle
    var ps = new THREE.Mesh(new THREE.CircleGeometry(PR * 1.58, 48), psurMat);
    ps.rotation.x = -Math.PI / 2;
    ps.position.set(pk.x, TY - 0.002, pk.z);
    scene.add(ps);
    // Black hole
    var ph = new THREE.Mesh(new THREE.CircleGeometry(PR * 0.90, 48), pholMat);
    ph.rotation.x = -Math.PI / 2;
    ph.position.set(pk.x, TY + 0.003, pk.z);
    scene.add(ph);
  }
}

function drawRect(x0, z0, x1, z1, y, col) {
  drawLine(x0, z0, x1, z0, y, col);
  drawLine(x1, z0, x1, z1, y, col);
  drawLine(x1, z1, x0, z1, y, col);
  drawLine(x0, z1, x0, z0, y, col);
}
function drawLine(x0, z0, x1, z1, y, col) {
  var g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x0, y, z0),
    new THREE.Vector3(x1, y, z1)
  ]);
  scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({color: col})));
}

// ═══════════════════════════════════════════════════
//  AIM VISUALISATION
// ═══════════════════════════════════════════════════
function buildAimVis() {
  var ag = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, TH + 0.05, 0),
    new THREE.Vector3(0, TH + 0.05, 0)
  ]);
  aimLine = new THREE.Line(ag, new THREE.LineBasicMaterial({color: 0x111111, transparent: true, opacity: 0.72}));
  aimLine.visible = false;
  scene.add(aimLine);

  for (var gi = 0; gi < GN; gi++) {
    var gd = new THREE.Mesh(
      new THREE.SphereGeometry(0.050, 7, 7),
      new THREE.MeshBasicMaterial({color: 0x222222, transparent: true, opacity: (1 - gi / GN) * 0.46})
    );
    gd.visible = false;
    scene.add(gd);
    ghosts.push(gd);
  }
}

function updateTraj(sx, sz, vx, vz) {
  var px = sx, pz = sz, pvx = vx, pvz = vz, dt = 0.06;
  for (var gi = 0; gi < GN; gi++) {
    var spd = Math.sqrt(pvx * pvx + pvz * pvz);
    if (spd < 0.15) { ghosts[gi].visible = false; continue; }
    var nx = pvx / spd, nz = pvz / spd;
    var ns = spd - FRIC_C * dt;
    ns *= Math.max(0, 1 - FRIC_V * dt);
    if (ns < 0) ns = 0;
    pvx = nx * ns; pvz = nz * ns;
    px += pvx * dt; pz += pvz * dt;
    if (px < -HB + RS) { px = -HB + RS; pvx =  Math.abs(pvx) * WELAST; }
    if (px >  HB - RS) { px =  HB - RS; pvx = -Math.abs(pvx) * WELAST; }
    if (pz < -HB + RS) { pz = -HB + RS; pvz =  Math.abs(pvz) * WELAST; }
    if (pz >  HB - RS) { pz =  HB - RS; pvz = -Math.abs(pvz) * WELAST; }
    ghosts[gi].position.set(px, TH + 0.06, pz);
    ghosts[gi].visible = true;
  }
}
function hideGhosts() {
  for (var i = 0; i < ghosts.length; i++) ghosts[i].visible = false;
}

// ═══════════════════════════════════════════════════
//  SPAWN ALL COINS
// ═══════════════════════════════════════════════════
function spawnAll() {
  for (var i = 0; i < coins.length; i++) scene.remove(coins[i].mesh);
  coins = [];
  if (striker) scene.remove(striker.mesh);

  var lay = makeLayout();
  var id = 0;
  for (var wi = 0; wi < lay.w.length; wi++)
    coins.push(new Coin(id++, 'white', RC, 1.0, lay.w[wi][0], lay.w[wi][1]));
  for (var bi = 0; bi < lay.b.length; bi++)
    coins.push(new Coin(id++, 'black', RC, 1.0, lay.b[bi][0], lay.b[bi][1]));
  coins.push(new Coin(id++, 'red', RR, 1.0, 0, 0));

  // Resolve spawn overlaps
  for (var iter = 0; iter < 60; iter++) {
    var ok = true;
    for (var ii = 0; ii < coins.length; ii++) {
      for (var jj = ii + 1; jj < coins.length; jj++) {
        var a = coins[ii], b = coins[jj];
        var dx = b.x - a.x, dz = b.z - a.z;
        var dist = Math.sqrt(dx * dx + dz * dz) || 1e-6;
        var md = a.r + b.r + 0.005;
        if (dist < md) {
          ok = false;
          var push = (md - dist) * 0.5, nx = dx / dist, nz = dz / dist;
          a.x -= nx * push; a.z -= nz * push;
          b.x += nx * push; b.z += nz * push;
        }
      }
    }
    if (ok) break;
  }

  var sz = flipped ? -SZ : SZ;
  striker = new Coin(id++, 'striker', RS, 2.5, 0, sz);
}

// ═══════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════
function toWorld(ev) {
  var r = renderer.domElement.getBoundingClientRect();
  mouse.x =  ((ev.clientX - r.left) / r.width)  * 2 - 1;
  mouse.y = -((ev.clientY - r.top)  / r.height) * 2 + 1;
  ray.setFromCamera(mouse, cam);
  // Intersect with board top surface plane (y = TH)
  var pl = new THREE.Plane(new THREE.Vector3(0, 1, 0), -TH);
  var pt = new THREE.Vector3();
  ray.ray.intersectPlane(pl, pt);
  return pt;
}

function onDown(ev) {
  if (!ready || !active || settling) return;
  var pt = toWorld(ev); if (!pt) return;
  var dx = pt.x - striker.x, dz = pt.z - striker.z;
  // Generous hit radius for mobile
  if (Math.sqrt(dx * dx + dz * dz) <= RS * 3.0) {
    dragging = true;
    aimLine.visible = true;
    document.getElementById('pw').style.display = 'block';
  }
}

function onMove(ev) {
  if (!dragging || !ready) return;
  var pt = toWorld(ev); if (!pt) return;
  var dx = pt.x - striker.x, dz = pt.z - striker.z;
  var rawLen = Math.sqrt(dx * dx + dz * dz);
  // Max drag distance = 4.4 units (≈ half board width)
  var maxDrag = 4.4;
  document.getElementById('pfill').style.width = (Math.min(rawLen / maxDrag, 1) * 100) + '%';
  var power = Math.min(rawLen, maxDrag) / maxDrag * MAX_PWR;
  var nl = rawLen || 1;
  var vx = -dx / nl * power, vz = -dz / nl * power;
  // Update aim line
  var pos = aimLine.geometry.attributes.position.array;
  pos[0] = striker.x;          pos[1] = TH + 0.06; pos[2] = striker.z;
  pos[3] = striker.x - dx * 2.6; pos[4] = TH + 0.06; pos[5] = striker.z - dz * 2.6;
  aimLine.geometry.attributes.position.needsUpdate = true;
  updateTraj(striker.x, striker.z, vx, vz);
}

function onUp(ev) {
  if (!dragging || !ready) return;
  dragging = false;
  aimLine.visible = false;
  hideGhosts();
  document.getElementById('pw').style.display = 'none';
  document.getElementById('pfill').style.width = '0%';
  var pt = toWorld(ev); if (!pt) return;
  var dx = striker.x - pt.x, dz = striker.z - pt.z;
  var len = Math.sqrt(dx * dx + dz * dz);
  if (len < 0.05) return;
  var maxDrag = 4.4;
  var power = Math.min(len, maxDrag) / maxDrag * MAX_PWR;
  striker.vx = dx / len * power;
  striker.vz = dz / len * power;
  settling = true;
}

// ═══════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════
function physicsStep(dt) {
  var sdt = dt / STEPS;
  for (var s = 0; s < STEPS; s++) subStep(sdt);

  // Pocket detection for coins
  var jp = null;
  for (var i = coins.length - 1; i >= 0; i--) {
    var c = coins[i];
    for (var pi = 0; pi < POCKETS.length; pi++) {
      var p = POCKETS[pi];
      var dx = c.x - p.x, dz = c.z - p.z;
      if (Math.sqrt(dx * dx + dz * dz) < PR * 0.88) {
        scene.remove(c.mesh);
        coins.splice(i, 1);
        c.pocketed = true;
        onPocket(c);
        jp = c;
        break;
      }
    }
  }

  // Queen cover rule
  if (qPending && jp && jp.type !== 'red' && jp.type === qBy) {
    qPending = false; qWon = qBy;
    if (qWon === 'white') sW += 5; else sB += 5;
    document.getElementById('qb').style.display = 'none';
    toast('QUEEN COVERED! +5 pts');
  }

  // Striker foul
  for (var pi = 0; pi < POCKETS.length; pi++) {
    var p = POCKETS[pi];
    var dx = striker.x - p.x, dz = striker.z - p.z;
    if (Math.sqrt(dx * dx + dz * dz) < PR * 0.88) {
      if (turn === 'white') sW = Math.max(0, sW - 1);
      else sB = Math.max(0, sB - 1);
      toast('FOUL! -1 point');
      resetStriker();
      updateHUD();
      break;
    }
  }

  // Settle check
  if (settling) {
    var moving = false;
    var all = coins.concat([striker]);
    for (var ai = 0; ai < all.length; ai++) {
      if (all[ai].speed() > REST_V) { moving = true; break; }
    }
    if (!moving) { settling = false; endTurn(); }
  }
}

function subStep(dt) {
  var all = coins.concat([striker]);
  for (var i = 0; i < all.length; i++) all[i].update(dt);

  // Wall collisions (skip if near a pocket)
  for (var i = 0; i < all.length; i++) {
    var c = all[i];
    var lo = -HB + c.r, hi = HB - c.r;
    var nearPocket = false;
    for (var pi = 0; pi < POCKETS.length; pi++) {
      var p = POCKETS[pi];
      var dx = c.x - p.x, dz = c.z - p.z;
      if (Math.sqrt(dx * dx + dz * dz) < PR + c.r * 0.7) { nearPocket = true; break; }
    }
    if (nearPocket) continue;
    if (c.x < lo) { c.x = lo; c.vx =  Math.abs(c.vx) * WELAST; }
    if (c.x > hi) { c.x = hi; c.vx = -Math.abs(c.vx) * WELAST; }
    if (c.z < lo) { c.z = lo; c.vz =  Math.abs(c.vz) * WELAST; }
    if (c.z > hi) { c.z = hi; c.vz = -Math.abs(c.vz) * WELAST; }
  }

  // Coin-coin collisions, 3 passes
  for (var pass = 0; pass < 3; pass++) {
    for (var i = 0; i < all.length; i++) {
      for (var j = i + 1; j < all.length; j++) {
        var a = all[i], b = all[j];
        var dx = b.x - a.x, dz = b.z - a.z;
        var dist = Math.sqrt(dx * dx + dz * dz);
        var md = a.r + b.r;
        if (dist >= md || dist < 0.001) continue;
        var nx = dx / dist, nz = dz / dist;
        var ov = md - dist, tm = a.mass + b.mass;
        a.x -= nx * 0.8 * ov * b.mass / tm;
        a.z -= nz * 0.8 * ov * b.mass / tm;
        b.x += nx * 0.8 * ov * a.mass / tm;
        b.z += nz * 0.8 * ov * a.mass / tm;
        if (pass > 0) continue;
        var dot = (b.vx - a.vx) * nx + (b.vz - a.vz) * nz;
        if (dot >= 0) continue;
        var j2 = -(1 + ELAST) * dot / (1 / a.mass + 1 / b.mass);
        a.vx -= j2 * nx / a.mass; a.vz -= j2 * nz / a.mass;
        b.vx += j2 * nx / b.mass; b.vz += j2 * nz / b.mass;
      }
    }
  }
}

function onPocket(c) {
  if (c.type === 'red') {
    qPending = true; qBy = turn;
    document.getElementById('qb').style.display = 'block';
    toast('QUEEN POCKETED - cover it!');
  } else if (c.type === 'white') {
    if (turn === 'white') { sW += 1; pW++; } else sB += 1;
  } else {
    if (turn === 'black') { sB += 1; pB++; } else sW += 1;
  }
  updateHUD(); checkWin();
}

function resetStriker() {
  var sz = flipped ? -SZ : SZ;
  striker.x = 0; striker.z = sz; striker.vx = 0; striker.vz = 0;
}

function endTurn() {
  if (qPending) {
    qPending = false;
    document.getElementById('qb').style.display = 'none';
    toast('Queen not covered - returned!');
    coins.push(new Coin(Date.now(), 'red', RR, 1, 0, 0));
  }
  turn = turn === 'white' ? 'black' : 'white';
  resetStriker(); updateHUD();
}

function checkWin() {
  var w = 0, b = 0;
  for (var i = 0; i < coins.length; i++) {
    if (coins[i].type === 'white') w++;
    if (coins[i].type === 'black') b++;
  }
  if (w === 0 || b === 0) {
    active = false;
    var winner = w === 0 ? 'WHITE' : 'BLACK';
    document.getElementById('wt').textContent = winner + ' WINS!';
    document.getElementById('ws').textContent = 'WHITE ' + sW + ' — BLACK ' + sB;
    document.getElementById('win').classList.add('on');
  }
}

// ═══════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('sW').textContent = sW;
  document.getElementById('sB').textContent = sB;
  var spW = document.getElementById('spW'), spB = document.getElementById('spB');
  if (turn === 'white') { spW.classList.add('on'); spB.classList.remove('on'); }
  else                  { spB.classList.add('on'); spW.classList.remove('on'); }
  document.getElementById('td').style.background = turn === 'white' ? '#f0ebe0' : '#555048';
  document.getElementById('tt').textContent = turn.toUpperCase() + "'S TURN";
  var cw = document.getElementById('dW'), cb = document.getElementById('dB');
  cw.innerHTML = ''; cb.innerHTML = '';
  for (var i = 0; i < pW; i++) { var d = document.createElement('div'); d.className = 'dot wd'; cw.appendChild(d); }
  if (qWon === 'white') { var d = document.createElement('div'); d.className = 'dot qd'; cw.appendChild(d); }
  for (var i = 0; i < pB; i++) { var d = document.createElement('div'); d.className = 'dot bd'; cb.appendChild(d); }
  if (qWon === 'black') { var d = document.createElement('div'); d.className = 'dot qd'; cb.appendChild(d); }
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(function() { t.classList.remove('on'); }, 2500);
}

// ═══════════════════════════════════════════════════
//  GAME LOOP + RESET
// ═══════════════════════════════════════════════════
function resetGame() {
  sW = 0; sB = 0; pW = 0; pB = 0;
  qPending = false; qBy = null; qWon = null;
  turn = 'white'; settling = false; dragging = false;
  aimLine.visible = false; hideGhosts();
  document.getElementById('qb').style.display = 'none';
  document.getElementById('win').classList.remove('on');
  spawnAll(); active = true; updateHUD();
}

var lastT = performance.now();
function loop() {
  requestAnimationFrame(loop);
  var now = performance.now();
  var dt = Math.min(0.025, (now - lastT) / 1000); lastT = now;
  if (ready) physicsStep(dt);
  renderer.render(scene, cam);
}

function onResize() {
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ── Button bindings ──────────────────────────────────
document.getElementById('bR').addEventListener('click', resetGame);
document.getElementById('wb').addEventListener('click', resetGame);
document.getElementById('bF').addEventListener('click', function() {
  flipped = !flipped; posCam(); resetStriker();
});
document.getElementById('b1').addEventListener('click', function() {
  document.getElementById('b1').classList.add('on');
  document.getElementById('b2').classList.remove('on');
  resetGame();
});
document.getElementById('b2').addEventListener('click', function() {
  document.getElementById('b2').classList.add('on');
  document.getElementById('b1').classList.remove('on');
  resetGame();
});

// ── BOOT ─────────────────────────────────────────────
initScene();
</script>
